name: Deploy ETF Dashboard

on:
  push:
    branches: [main]
  workflow_dispatch:
  # 매일 오전 7시 (KST) = UTC 22:00 전날 실행 (미국 장 마감 후)
  schedule:
    - cron: '10 0 * * *'   # 오전 9시 10분 KST (UTC 00:10)
    - cron: '0 4 * * *'    # 오후 1시 KST (UTC 04:00)
    - cron: '0 7 * * *'    # 오후 4시 KST (UTC 07:00)
    - cron: '10 15 * * *'  # 오전 12시 10분 KST (UTC 15:10)
    - cron: '0 19 * * *'   # 오전 4시 KST (UTC 19:00)
    - cron: '0 22 * * *'   # 오전 7시 KST (UTC 22:00)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # ── 1. ETF 데이터 수집 ─────────────────────────────────────────
  collect-data:
    name: Collect ETF Data
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Collect ETF prices
        run: node scripts/collect-etf-data.js
        env:
          GROK_API_KEY: ${{ secrets.GROK_API_KEY }}

      - name: Commit data
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git fetch origin main
          git reset --soft origin/main
          git add public/data.json
          git diff --staged --quiet || git commit -m "chore: update ETF data $(date +'%Y-%m-%d')"
          git push origin main --force-with-lease

  # ── 2. 프론트엔드 빌드 & Cloudflare Pages 배포 ─────────────────
  deploy-pages:
    name: Deploy Cloudflare Pages
    runs-on: ubuntu-latest
    needs: collect-data
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_WORKER_URL: ${{ secrets.VITE_WORKER_URL }}

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: pages deploy dist --project-name=etf-radar
